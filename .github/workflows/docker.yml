name: Build and push Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      decred_version:
        description: 'Decred version to build (e.g. 2.1.3)'
        required: true
        default: '2.1.3'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/decred

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Decred version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.decred_version }}" >> $GITHUB_OUTPUT
            echo "tag=${{ github.event.inputs.decred_version }}" >> $GITHUB_OUTPUT
          else
            # Extract version from git tag (v2.1.3 -> 2.1.3)
            TAG="${{ github.ref_name }}"
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
            echo "tag=${TAG#v}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.decred
          push: true
          build-args: |
            DECRED_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
